services:
  - type: web
    name: delivery-eta-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod --workspace=api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CACHE_TTL_PINCODE
        value: 3600
      - key: CACHE_TTL_TENANT
        value: 300
      - key: THROTTLE_TTL
        value: 60
      - key: THROTTLE_LIMIT
        value: 60
